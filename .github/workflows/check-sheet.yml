name: Check Google Sheet for changes

on:

  schedule:

    # Runs every 15 minutes. GitHub Actions cron can lag under load,

    # so treat this as "at least every ~15-20 min", not exact.

    - cron: "*/15 * * * *"

  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:

  contents: write  # needed so the workflow can commit the updated snapshot.csv

jobs:

  check-sheet:

    runs-on: ubuntu-latest

    steps:

      - name: Check out repo

        uses: actions/checkout@v4
        with:
    fetch-depth: 0

      - name: Set up Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Install dependencies

        run: pip install requests

      - name: Run sheet check

        env:

          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

          SHEET_GID: ${{ secrets.SHEET_GID }}

          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

        run: python check_sheet.py

- name: Commit updated snapshot
  run: |
    git config user.name "sheet-watcher-bot"
    git config user.email "actions@github.com"

    git add snapshot.csv

    if ! git diff --cached --quiet; then
      git commit -m "Update sheet snapshot"

      git pull --rebase origin main
      git push origin main
    fi
